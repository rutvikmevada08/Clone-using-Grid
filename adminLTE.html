<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<link rel="stylesheet" href="stylegrid.css">

<link
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
rel="stylesheet">

</head>

<body>

<div class="container">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">
            <h2>Dashboard</h2>
        </div>

        <ul>

            <li class="active">
                <i class="fa-solid fa-house"></i>
                Dashboard
            </li>

            <li>
                <i class="fa-solid fa-user"></i>
                Users
            </li>

            <li>
                <i class="fa-solid fa-chart-line"></i>
                Analytics
            </li>

            <li>
                <i class="fa-solid fa-box"></i>
                Products
            </li>

            <li>
                <i class="fa-solid fa-gear"></i>
                Settings
            </li>

        </ul>

    </aside>



    <!-- Navbar -->

    <header class="navbar">

        <div class="left">

            <i class="fa-solid fa-bars"></i>

        </div>

        <div class="right">

            <i class="fa-solid fa-bell"></i>

            <i class="fa-solid fa-envelope"></i>

            <img src="me.jpeg" alt="Profile">

        </div>

    </header>




    <!-- Main -->

    <main class="main">

        <h1>Dashboard</h1>


        <!-- Cards -->

        <div class="cards">

            <div class="card blue">

                <h2>150</h2>

                <p>New Orders</p>

                <i class="fa-solid fa-cart-shopping icon"></i>

            </div>


            <div class="card green">

                <h2>53%</h2>

                <p>Bounce Rate</p>

                <i class="fa-solid fa-chart-simple icon"></i>

            </div>


            <div class="card yellow">

                <h2>44</h2>

                <p>User Registrations</p>

                <i class="fa-solid fa-user icon"></i>

            </div>


            <div class="card red">

                <h2>65</h2>

                <p>Visitors</p>

                <i class="fa-solid fa-chart-pie icon"></i>

            </div>

        </div>



        <!-- Charts -->

        <div class="charts">

            <div class="chart">

                <div class="card-header">

                    Sales Graph

                </div>

                <div class="body graph">
                    <img src="chart.webp" alt="Sales Chart">
                </div>

            </div>


            <div class="chart">

                <div class="card-header">

                    World Map

                </div>

                <div class="body map">
                    <img src="world-map.jpg" alt="World Map">
                </div>

            </div>

        </div>

    </main>

</div>

</body>
</html>
